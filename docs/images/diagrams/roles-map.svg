<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Built-in roles and scope</title><desc id="desc">The ladder narrows by scope; permissions also become safer and more limited.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Built-in roles and scope</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">The ladder narrows by scope; permissions also become safer and more limited.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="100" y="190" width="1400" height="95" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="800" y="227.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Supreme Admin</tspan></text><text x="800" y="257" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">GLOBAL — all kingdoms, users, plans, roles,</tspan><tspan x="800" dy="18">and platform settings</tspan></text></g>
<g><rect x="190" y="315" width="1220" height="95" rx="16" fill="#ffffff" stroke="#2f6f9f" stroke-width="3"/><text x="800" y="352.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">King</tspan></text><text x="800" y="382" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">KINGDOM — one kingdom and every alliance</tspan><tspan x="800" dy="18">inside it</tspan></text></g>
<g><rect x="280" y="440" width="1040" height="95" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="800" y="477.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Alliance Leader</tspan></text><text x="800" y="507" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">ALLIANCE — players, events, imports, usage,</tspan><tspan x="800" dy="18">and grant decisions</tspan></text></g>
<g><rect x="370" y="565" width="860" height="95" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="800" y="602.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Co-Leader</tspan></text><text x="800" y="632" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">ALLIANCE — daily tracking; no deletes,</tspan><tspan x="800" dy="18">settings, or audit logs</tspan></text></g>
<g><rect x="460" y="690" width="680" height="95" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="800" y="727.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Alliance Player</tspan></text><text x="800" y="766" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">ALLIANCE — view-only data and reports</tspan></text></g>
<text x="800" y="845" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="600" fill="#526579"><tspan x="800" dy="0">Custom roles can vary, but scope still limits where permissions apply.</tspan></text>
</svg>