<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Session lock and unlock request</title><desc id="desc">Instances auto-lock three days after they end; approval reopens them for changes.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Session lock and unlock request</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Instances auto-lock three days after they end; approval reopens them for changes.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="60" y="250" width="210" height="95" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="165" y="297.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="165" dy="0">Instance ends</tspan></text></g><g><path d="M270 298 L320 298" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="320" y="250" width="230" height="95" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="435" y="297.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="435" dy="0">3-day window</tspan></text></g><g><path d="M550 298 L600 298" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="600" y="250" width="220" height="95" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="710" y="297.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="710" dy="0">Auto-lock</tspan></text></g><g><path d="M820 298 L870 298" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="870" y="250" width="240" height="95" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="990" y="297.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="990" dy="0">Edit/import attempt</tspan></text></g><g><path d="M1110 298 L1160 298" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="1160" y="250" width="250" height="95" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1285" y="297.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1285" dy="0">Lock error</tspan></text></g>
<g><path d="M1285 345 V470" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1285" y="420" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1285" dy="0">request unlock</tspan></text></g><g><rect x="1130" y="470" width="310" height="95" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="1285" y="507.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1285" dy="0">Reviewer decides</tspan></text><text x="1285" y="546" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1285" dy="0">King, Leader, Supreme Admin</tspan></text></g>
<g><path d="M1130 518 H900 V650" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="970" y="505" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="970" dy="0">approve</tspan></text></g><g><path d="M1440 518 H1500 V650" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1470" y="505" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1470" dy="0">reject</tspan></text></g>
<g><rect x="730" y="650" width="340" height="95" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="900" y="687.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="900" dy="0">Instance reopens</tspan></text><text x="900" y="726" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="900" dy="0">changes allowed again</tspan></text></g><g><rect x="1290" y="650" width="240" height="95" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1410" y="697.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1410" dy="0">Stays locked</tspan></text></g>
</svg>