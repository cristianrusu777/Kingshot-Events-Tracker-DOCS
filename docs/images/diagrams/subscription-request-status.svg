<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Subscription request status</title><desc id="desc">Replies continue the conversation; status changes happen through admin actions.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Subscription request status</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Replies continue the conversation; status changes happen through admin actions.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="80" y="300" width="220" height="95" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="190" y="347.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="190" dy="0">Pending</tspan></text></g>
<g><path d="M300 325 H410 V220 H500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="405" y="205" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="405" dy="0">approve</tspan></text></g><g><rect x="500" y="170" width="230" height="95" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="615" y="217.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="615" dy="0">Approved</tspan></text></g><g><path d="M730 218 L970 218" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="850" y="208" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="850" dy="0">complete</tspan></text></g>
<g><path d="M300 350 H410 V440 H500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="405" y="460" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="405" dy="0">send instructions</tspan></text></g><g><rect x="500" y="390" width="260" height="95" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="630" y="437.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="630" dy="0">Awaiting payment</tspan></text></g><g><path d="M760 438 L970 438" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="865" y="428" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="865" dy="0">complete</tspan></text></g>
<g><path d="M300 375 H410 V650 H500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="405" y="670" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="405" dy="0">reject</tspan></text></g><g><rect x="500" y="600" width="230" height="95" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="615" y="647.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="615" dy="0">Rejected</tspan></text></g>
<g><rect x="970" y="280" width="250" height="105" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1095" y="322.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1095" dy="0">Completed</tspan></text><text x="1095" y="366" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1095" dy="0">optional plan assignment</tspan></text></g>
<g><path d="M630 485 V555 H850 V485" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="815" y="545" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="815" dy="0">reply / clarify</tspan></text></g>
<text x="800" y="790" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="600" fill="#12395b"><tspan x="800" dy="0">A reply does not complete the request; an admin must explicitly complete it.</tspan></text>
</svg>