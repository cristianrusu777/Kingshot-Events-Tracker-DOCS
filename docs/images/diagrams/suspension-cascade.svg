<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Does a kingdom suspension cascade?</title><desc id="desc">The reason decides the rule. An alliance’s own suspension always wins.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Does a kingdom suspension cascade?</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">The reason decides the rule. An alliance’s own suspension always wins.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="610" y="180" width="380" height="95" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="800" y="227.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Kingdom suspended</tspan></text></g><g><path d="M800 275 L800 335" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="610" y="335" width="380" height="95" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="800" y="382.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">What is the reason?</tspan></text></g>
<g><path d="M610 382 H360 V500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="435" y="365" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="435" dy="0">usage limit</tspan></text></g><g><path d="M990 382 H1240 V500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1190" y="352.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1190" dy="0">manual / admin /</tspan><tspan x="1190" dy="25">abuse / global</tspan></text></g>
<g><rect x="150" y="500" width="420" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="360" y="532.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">Direct paid alliance</tspan><tspan x="360" dy="25">plan?</tspan></text><text x="360" y="591" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">grant-only and free are not direct</tspan></text></g><g><rect x="1030" y="500" width="420" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="1240" y="545" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1240" dy="0">Supreme Admin override?</tspan></text><text x="1240" y="591" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1240" dy="0">specific parent-suspension exemption</tspan></text></g>
<g><path d="M270 610 V710 H190" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="230" y="700" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="230" dy="0">yes</tspan></text></g><g><path d="M450 610 V710 H530" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="490" y="700" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="490" dy="0">no</tspan></text></g>
<g><path d="M1150 610 V710 H1070" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1110" y="700" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1110" dy="0">yes</tspan></text></g><g><path d="M1330 610 V710 H1410" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1370" y="700" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1370" dy="0">no</tspan></text></g>
<g><rect x="70" y="710" width="240" height="90" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="190" y="745" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="190" dy="0">Survives</tspan></text><text x="190" y="781" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="190" dy="0">keeps working</tspan></text></g><g><rect x="410" y="710" width="240" height="90" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="530" y="745" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="530" dy="0">Paused</tspan></text><text x="530" y="781" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="530" dy="0">with kingdom</tspan></text></g>
<g><rect x="950" y="710" width="240" height="90" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1070" y="745" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1070" dy="0">Survives</tspan></text><text x="1070" y="781" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1070" dy="0">override applies</tspan></text></g><g><rect x="1290" y="710" width="240" height="90" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1410" y="745" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1410" dy="0">Paused</tspan></text><text x="1410" y="781" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1410" dy="0">with kingdom</tspan></text></g>
</svg>