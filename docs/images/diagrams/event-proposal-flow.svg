<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Event template proposal</title><desc id="desc">A scoped user proposes a change; the owner compares it before deciding.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Event template proposal</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">A scoped user proposes a change; the owner compares it before deciding.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="80" y="300" width="290" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="225" y="345" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="225" dy="0">Scoped user proposes</tspan></text><text x="225" y="391" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="225" dy="0">template change</tspan></text></g><g><path d="M370 355 L450 355" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="450" y="300" width="280" height="110" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="590" y="355" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="590" dy="0">Pending proposal</tspan></text></g><g><path d="M730 355 L810 355" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="810" y="300" width="300" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="960" y="345" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="960" dy="0">Owner reviews</tspan></text><text x="960" y="391" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="960" dy="0">before → after fields</tspan></text></g>
<g><path d="M1110 330 H1200 V230 H1280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1195" y="215" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1195" dy="0">accept</tspan></text></g><g><rect x="1280" y="180" width="250" height="100" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1405" y="230" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1405" dy="0">Template updated</tspan></text></g>
<g><path d="M1110 380 H1200 V500 H1280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1195" y="520" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1195" dy="0">refuse</tspan></text></g><g><rect x="1280" y="450" width="250" height="100" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1405" y="500" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1405" dy="0">Proposal closed</tspan></text></g>
<text x="800" y="710" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="600" fill="#12395b"><tspan x="800" dy="0">Review scoring mode, stages, and participant policy before accepting.</tspan></text>
