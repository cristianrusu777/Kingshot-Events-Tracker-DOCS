<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Power updates when an import is accepted</title><desc id="desc">Power can update safely without letting bad OCR or another alliance hijack membership.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Power updates when an import is accepted</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Power can update safely without letting bad OCR or another alliance hijack membership.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<text x="360" y="190" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="600" fill="#12395b"><tspan x="360" dy="0">INPUT ROW</tspan></text><text x="1240" y="190" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="600" fill="#12395b"><tspan x="1240" dy="0">RESULT</tspan></text>
<g><rect x="80" y="240" width="560" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="360" y="272.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">Existing valid power +</tspan><tspan x="360" dy="25">invalid OCR power</tspan></text><text x="360" y="331" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">missing, malformed, or unusable read</tspan></text></g><g><path d="M640 295 L960 295" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="800" y="285" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="800" dy="0">accept</tspan></text></g><g><rect x="960" y="240" width="560" height="110" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1240" y="285" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1240" dy="0">Keep existing power</tspan></text><text x="1240" y="331" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1240" dy="0">do not overwrite good data</tspan></text></g>
<g><rect x="80" y="420" width="560" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="360" y="465" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">Valid OCR power</tspan></text><text x="360" y="511" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">usable numeric read</tspan></text></g><g><path d="M640 475 L960 475" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="800" y="465" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="800" dy="0">accept</tspan></text></g><g><rect x="960" y="420" width="560" height="110" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1240" y="465" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1240" dy="0">Update power</tspan></text><text x="1240" y="511" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1240" dy="0">change trail records update</tspan></text></g>
<g><rect x="80" y="600" width="560" height="120" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="360" y="637.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">Player belongs to</tspan><tspan x="360" dy="25">another alliance</tspan></text><text x="360" y="692" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">row has valid power plus role/membership</tspan><tspan x="360" dy="18">fields</tspan></text></g><g><path d="M640 660 L960 660" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="800" y="650" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="800" dy="0">accept</tspan></text></g><g><rect x="960" y="600" width="560" height="120" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="1240" y="650" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1240" dy="0">Power only</tspan></text><text x="1240" y="701" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1240" dy="0">do not move alliance or copy rank/role</tspan></text></g>
</svg>