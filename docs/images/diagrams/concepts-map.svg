<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">How the tracker’s data fits together</title><desc id="desc">People belong to a hierarchy; event templates create instances that hold results.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">How the tracker’s data fits together</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">People belong to a hierarchy; event templates create instances that hold results.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="80" y="180" width="178" height="34" rx="17" fill="#2f6f9f"/><text x="169" y="203" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#ffffff"><tspan x="169" dy="0">PEOPLE &amp; SCORES</tspan></text></g><g><rect x="80" y="240" width="240" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="200" y="290" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="200" dy="0">Kingdom</tspan></text></g><g><path d="M320 290 L390 290" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="390" y="240" width="240" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="510" y="290" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="510" dy="0">Alliance</tspan></text></g><g><path d="M630 290 L700 290" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="700" y="240" width="240" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="820" y="290" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="820" dy="0">Player</tspan></text></g><g><path d="M940 290 L1010 290" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="1010" y="240" width="300" height="100" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1160" y="280" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1160" dy="0">Result</tspan></text><text x="1160" y="321" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1160" dy="0">one player in one instance</tspan></text></g>
<g><rect x="80" y="470" width="138" height="34" rx="17" fill="#a86516"/><text x="149" y="493" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#ffffff"><tspan x="149" dy="0">EVENT SETUP</tspan></text></g><g><rect x="250" y="540" width="300" height="110" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="400" y="585" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="400" dy="0">Event template</tspan></text><text x="400" y="631" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="400" dy="0">reusable rules / recipe</tspan></text></g><g><path d="M550 595 L650 595" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="650" y="540" width="300" height="110" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="800" y="585" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Event instance</tspan></text><text x="800" y="631" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">one scheduled run</tspan></text></g><g><path d="M950 595 L1050 595" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="1050" y="540" width="300" height="110" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1200" y="585" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1200" dy="0">Results</tspan></text><text x="1200" y="631" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1200" dy="0">scores and participation</tspan></text></g>
