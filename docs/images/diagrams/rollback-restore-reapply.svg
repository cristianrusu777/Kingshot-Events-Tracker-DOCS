<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Delete → rollback → restore → re-apply</title><desc id="desc">Restore revives staging and review state, not the old live results.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Delete → rollback → restore → re-apply</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Restore revives staging and review state, not the old live results.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="90" y="250" width="290" height="120" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="235" y="300" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="235" dy="0">1 Delete import</tspan></text><text x="235" y="351" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="235" dy="0">choose rollback with results</tspan></text></g><g><path d="M380 310 L470 310" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="470" y="250" width="290" height="120" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="615" y="300" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="615" dy="0">2 Rollback</tspan></text><text x="615" y="351" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="615" dy="0">tracked live changes undone</tspan></text></g><g><path d="M760 310 L850 310" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="850" y="250" width="290" height="120" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="995" y="300" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="995" dy="0">3 Restore</tspan></text><text x="995" y="351" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="995" dy="0">staging rows return</tspan></text></g><g><path d="M1140 310 L1230 310" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="1230" y="250" width="290" height="120" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1375" y="300" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1375" dy="0">4 Re-apply</tspan></text><text x="1375" y="351" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1375" dy="0">review, then accept again</tspan></text></g>
<g><path d="M1375 370 V520 H235 V370" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="805" y="492.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="805" dy="0">repeat if still</tspan><tspan x="805" dy="25">wrong</tspan></text></g>
<g><rect x="200" y="630" width="1200" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="800" y="670" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">Key rule</tspan></text><text x="800" y="693" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">Restore does not directly re-save deleted</tspan><tspan x="800" dy="18">results. Live data returns only after</tspan><tspan x="800" dy="18">re-accept.</tspan></text></g>
</svg>