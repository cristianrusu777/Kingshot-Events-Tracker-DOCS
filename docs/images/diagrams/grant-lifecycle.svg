<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Kingdom grant lifecycle</title><desc id="desc">A grant is only an offer until an alliance leader or co-leader accepts it.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Kingdom grant lifecycle</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">A grant is only an offer until an alliance leader or co-leader accepts it.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="70" y="300" width="250" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="195" y="350" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="195" dy="0">King creates offer</tspan></text></g><g><path d="M320 350 L390 350" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="390" y="300" width="240" height="100" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="510" y="340" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="510" dy="0">Pending</tspan></text><text x="510" y="381" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="510" dy="0">no premium yet</tspan></text></g>
<g><path d="M630 350 H720 V230 H800" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="710" y="220" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="710" dy="0">accept</tspan></text></g><g><rect x="800" y="180" width="250" height="100" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="925" y="220" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="925" dy="0">Active</tspan></text><text x="925" y="261" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="925" dy="0">grant becomes effective plan</tspan></text></g>
<g><path d="M630 350 H720 V500 H800" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="710" y="515" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="710" dy="0">reject</tspan></text></g><g><rect x="800" y="450" width="250" height="100" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="925" y="490" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="925" dy="0">Rejected</tspan></text><text x="925" y="531" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="925" dy="0">offer has no effect</tspan></text></g>
<g><path d="M1050 230 H1160 V350 H1240" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1160" y="210" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1160" dy="0">king revokes</tspan></text></g><g><path d="M1050 230 H1160 V350" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1160" y="390" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1160" dy="0">alliance returns</tspan></text></g>
<g><rect x="1240" y="300" width="280" height="110" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1380" y="345" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1380" dy="0">Inactive / ended</tspan></text><text x="1380" y="391" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1380" dy="0">granted premium removed</tspan></text></g>
<text x="800" y="690" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="600" fill="#12395b"><tspan x="800" dy="0">Pending, rejected, revoked, or expired grants do not unlock premium.</tspan></text>
</svg>