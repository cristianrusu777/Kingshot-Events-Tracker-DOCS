<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Restore request flow</title><desc id="desc">Users without restore permission ask an authorized approver to decide.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Restore request flow</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Users without restore permission ask an authorized approver to decide.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="100" y="300" width="270" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="235" y="350" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="235" dy="0">User finds deleted item</tspan></text></g><g><path d="M370 350 L440 350" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="440" y="300" width="270" height="100" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="575" y="350" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="575" dy="0">Request restore</tspan></text></g><g><path d="M710 350 L780 350" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g><g><rect x="780" y="300" width="270" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="915" y="350" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="915" dy="0">Approver reviews</tspan></text></g>
<g><path d="M1050 330 H1140 V240 H1220" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1135" y="225" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1135" dy="0">approve</tspan></text></g><g><rect x="1220" y="190" width="280" height="100" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1360" y="240" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1360" dy="0">Item restored</tspan></text></g>
<g><path d="M1050 370 H1140 V500 H1220" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1135" y="520" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1135" dy="0">reject</tspan></text></g><g><rect x="1220" y="450" width="280" height="100" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="1360" y="490" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1360" dy="0">Request rejected</tspan></text><text x="1360" y="531" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1360" dy="0">item stays deleted</tspan></text></g>
</svg>