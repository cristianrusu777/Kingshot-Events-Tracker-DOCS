<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Import lifecycle</title><desc id="desc">Uploading creates review rows; accepting writes live data. Rollback and restore return the import to review.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Import lifecycle</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">Uploading creates review rows; accepting writes live data. Rollback and restore return the import to review.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<g><rect x="70" y="170" width="138" height="34" rx="17" fill="#2f6f9f"/><text x="139" y="193" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#ffffff"><tspan x="139" dy="0">NORMAL PATH</tspan></text></g>
<g><rect x="70" y="230" width="230" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="185" y="270" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="185" dy="0">Upload</tspan></text><text x="185" y="311" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="185" dy="0">screenshot or sheet</tspan></text></g><g><path d="M300 280 L350 280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="350" y="230" width="230" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="465" y="280" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="465" dy="0">Processing</tspan></text></g><g><path d="M580 280 L630 280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="630" y="230" width="260" height="100" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="760" y="280" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="760" dy="0">Completed with review</tspan></text></g><g><path d="M890 280 L940 280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="940" y="230" width="230" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="1055" y="280" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1055" dy="0">Review rows</tspan></text></g><g><path d="M1170 280 L1220 280" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="1220" y="230" width="260" height="100" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1350" y="280" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1350" dy="0">Accept → data written</tspan></text></g>
<g><path d="M465 330 V420 H630" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="535" y="395" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="535" dy="0">failure</tspan></text></g><g><rect x="630" y="380" width="260" height="90" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="760" y="415" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="760" dy="0">Failed</tspan></text><text x="760" y="451" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="760" dy="0">fix source/provider; retry</tspan></text></g>
<g><rect x="70" y="520" width="218" height="34" rx="17" fill="#a86516"/><text x="179" y="543" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#ffffff"><tspan x="179" dy="0">UNDO / RESTORE LOOP</tspan></text></g>
<g><rect x="70" y="580" width="240" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="190" y="630" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="190" dy="0">Applied import</tspan></text></g><g><path d="M310 630 L360 630" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="360" y="580" width="250" height="100" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="485" y="630" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="485" dy="0">Delete + rollback</tspan></text></g><g><path d="M610 630 L660 630" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="660" y="580" width="220" height="100" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="770" y="630" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="770" dy="0">Rolled back</tspan></text></g><g><path d="M880 630 L930 630" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="930" y="580" width="220" height="100" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="1040" y="630" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1040" dy="0">Recycle Bin</tspan></text></g><g><path d="M1150 630 L1200 630" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/></g>
<g><rect x="1200" y="580" width="270" height="100" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="1335" y="620" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1335" dy="0">Restore → draft</tspan></text><text x="1335" y="661" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1335" dy="0">review and accept again</tspan></text></g>
<g><path d="M1335 680 V760 H1055 V330" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1200" y="745" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1200" dy="0">back to review</tspan></text></g>
</svg>