<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Which subscription plan wins?</title><desc id="desc">The app checks from top to bottom and stops at the first plan that applies.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#c58a16"/></marker></defs><rect width="1600" height="900" fill="#f7f9fc"/><rect x="0" y="0" width="1600" height="12" fill="#c58a16"/><text x="70" y="70" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700" fill="#12395b"><tspan x="70" dy="0">Which subscription plan wins?</tspan></text><text x="70" y="112" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="400" fill="#526579"><tspan x="70" dy="0">The app checks from top to bottom and stops at the first plan that applies.</tspan></text><line x1="70" y1="140" x2="1530" y2="140" stroke="#9aabbb"/>
<text x="360" y="200" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="600" fill="#12395b"><tspan x="360" dy="0">ALLIANCE</tspan></text><text x="1180" y="200" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="600" fill="#12395b"><tspan x="1180" dy="0">KINGDOM</tspan></text>
<g><rect x="140" y="250" width="440" height="105" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="360" y="292.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">1 Direct alliance plan</tspan></text><text x="360" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">highest priority</tspan></text></g><g><path d="M360 355 L360 410" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="360" y="372.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="360" dy="0">if none</tspan></text></g>
<g><rect x="140" y="410" width="440" height="105" rx="16" fill="#fff3df" stroke="#a86516" stroke-width="3"/><text x="360" y="452.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">2 Accepted kingdom grant</tspan></text><text x="360" y="496" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">pending offers do not count</tspan></text></g><g><path d="M360 515 L360 570" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="360" y="532.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="360" dy="0">if none</tspan></text></g>
<g><rect x="140" y="570" width="440" height="105" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="360" y="612.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="360" dy="0">3 Free tier</tspan></text><text x="360" y="656" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="360" dy="0">automatic fallback</tspan></text></g>
<g><rect x="960" y="250" width="440" height="105" rx="16" fill="#e8f5ee" stroke="#287a58" stroke-width="3"/><text x="1180" y="292.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1180" dy="0">1 Direct kingdom plan</tspan></text><text x="1180" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1180" dy="0">highest priority</tspan></text></g><g><path d="M1180 355 L1180 500" fill="none" stroke="#c58a16" stroke-width="4" marker-end="url(#arrow)"/><text x="1180" y="417.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#526579"><tspan x="1180" dy="0">if none</tspan></text></g>
<g><rect x="960" y="500" width="440" height="105" rx="16" fill="#ffffff" stroke="#12395b" stroke-width="3"/><text x="1180" y="542.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="1180" dy="0">2 Free tier</tspan></text><text x="1180" y="586" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="1180" dy="0">automatic fallback</tspan></text></g>
<g><rect x="650" y="720" width="300" height="85" rx="16" fill="#fbecec" stroke="#b54444" stroke-width="3"/><text x="800" y="752.5" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="600" fill="#102a43"><tspan x="800" dy="0">No inherited tier</tspan></text><text x="800" y="786" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="400" fill="#526579"><tspan x="800" dy="0">premium never flows silently</tspan></text></g>
</svg>